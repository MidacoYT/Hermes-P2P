<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <linearGradient id="hGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8f4fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- Stylized H representing Hermes/File transfer -->
  <g transform="translate(128, 128)">
    <!-- Left vertical bar of H -->
    <rect x="-50" y="-60" width="24" height="120" rx="6" fill="url(#hGradient)"/>

    <!-- Right vertical bar of H -->
    <rect x="26" y="-60" width="24" height="120" rx="6" fill="url(#hGradient)"/>

    <!-- Middle horizontal bar of H (stylized as transfer arrow) -->
    <rect x="-26" y="-8" width="52" height="16" rx="4" fill="#0078d4"/>

    <!-- Left arrow head (sending) -->
    <path d="M-35,0 L-50,-10 L-50,10 Z" fill="#0078d4"/>

    <!-- Right arrow head (receiving) -->
    <path d="M35,0 L50,-10 L50,10 Z" fill="#0078d4"/>

    <!-- Circular nodes representing connection points -->
    <circle cx="-64" cy="0" r="10" fill="white" stroke="#0078d4" stroke-width="3"/>
    <circle cx="64" cy="0" r="10" fill="white" stroke="#0078d4" stroke-width="3"/>

    <!-- Connection lines (dashed for data flow) -->
    <line x1="-54" y1="0" x2="-26" y2="0" stroke="#0078d4" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="26" y1="0" x2="54" y2="0" stroke="#0078d4" stroke-width="2" stroke-dasharray="3,2"/>
  </g>
</svg>
